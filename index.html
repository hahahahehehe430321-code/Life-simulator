<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港人生模擬器 - 每年完全獨立事件版</title>
    <style>
        :root {
            --primary-color: #1e3799;
            --hk-red: #de2910;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #1e3799, #0c2461);
            color: white;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
        }
        header p {
            margin: 0;
            opacity: 0.8;
            font-size: 13px;
        }
        /* 導航目錄 */
        .nav-tabs {
            display: flex;
            background: #dfe4ea;
            border-bottom: 1px solid #ced6e0;
        }
        .nav-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            color: #57606f;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 15px;
            transition: all 0.2s;
        }
        .nav-tab.active {
            background: white;
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
        }
        .tab-content {
            display: none;
            padding: 20px;
            min-height: 380px;
        }
        .tab-content.active {
            display: block;
        }

        /* 狀態欄 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        .stat-card {
            background: white;
            padding: 10px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 3px;
            display: flex;
            justify-content: space-between;
        }
        .progress-bar-container {
            width: 100%;
            background: #e9ecef;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            transition: width 0.4s ease;
        }
        .bar-health { background-color: #2ecc71; }
        .bar-happiness { background-color: #f1c40f; }
        .bar-smart { background-color: #3498db; }
        .bar-wealth { background-color: #e67e22; }

        .info-panel {
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-weight: bold;
            font-size: 14px;
            color: #2c3e50;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
        }

        /* 故事區 */
        .story-year {
            font-size: 13px;
            color: var(--hk-red);
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .story-text {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .choice-btn {
            background: #ffffff;
            border: 2px solid #3498db;
            color: #2980b9;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .choice-btn:hover {
            background: #3498db;
            color: white;
            transform: translateY(-2px);
        }
        .next-year-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
            transition: background 0.2s;
            margin-top: 15px;
        }
        .next-year-btn:hover { background: #219653; }

        /* 人際關係頁面 */
        .relation-card {
            background: #f8f9fa;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #3498db;
        }
        .relation-name { font-weight: bold; font-size: 15px; color: #2c3e50; }
        .relation-desc { font-size: 13px; color: #666; margin-top: 3px; }

        /* 聊天室頁面 */
        .chat-list { display: flex; flex-direction: column; gap: 10px; }
        .chat-contact-btn {
            background: #fff;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: #2c3e50;
            transition: background 0.2s;
        }
        .chat-contact-btn:hover { background: #f1f2f6; }
        
        .chat-window { display: none; }
        .chat-box {
            background: #f1f2f6;
            height: 230px;
            border-radius: 8px;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }
        .chat-bubble {
            max-width: 80%;
            padding: 9px 13px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.4;
        }
        .chat-bubble.me { background: #3498db; color: white; align-self: flex-end; }
        .chat-bubble.other { background: white; color: #333; align-self: flex-start; border: 1px solid #ddd; }
        .back-chat-btn {
            background: #7f8c8d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 13px;
        }

        /* 彈窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 420px;
            width: 90%;
        }
        .restart-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🇭🇰 香港人生模擬器</h1>
        <p>每年專屬獨立事件 • 即時暢順雙向聊天</p>
    </header>

    <!-- 頂部目錄導航 -->
    <div class="nav-tabs">

    <!-- 狀態欄 -->

        </div>
        <div class="stat-card">
            <div class="stat-label"><span>🧠 智慧 / 學業</span><span id="statSmartNum">50%</span></div>
            <div class="progress-bar-container"><div id="barSmart" class="progress-bar bar-smart" style="width: 50%;"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><span>💰 財富</span><span id="statWealthNum">$5,000</span></div>
            <div class="progress-bar-container"><div id="barWealth" class="progress-bar bar-wealth" style="width: 20%;"></div></div>
        </div>
    </div>

    <div class="info-panel">
        <div class="info-row">
            <span id="infoName">姓名：--</span>
            <span id="infoDistrict">地區：--</span>
        </div>
        <div class="info-row">
            <span id="infoAge">年齡：0 歲</span>
            <span id="infoHousing">住屋：--</span>
        </div>
    </div>

    <!-- 頁面 1：主頁 -->
    <div id="tab-home" class="tab-content active">
        <div class="story-year" id="storyYear">年份：2026年</div>
        <div class="story-text" id="storyText">正在隨機投胎中……</div>
        <div class="choices-container" id="choicesContainer"></div>
        <button class="next-year-btn" id="nextYearBtn" onclick="nextYear()" style="display:none;">⏩ 進入下一年</button>
    </div>

    <!-- 頁面 2：人際關係 -->
    <div id="tab-relations" class="tab-content">
        <h3>👥 現實人際網絡</h3>
        <div id="relationsList"></div>
    </div>

    <!-- 頁面 3：聊天室 -->
    <div id="tab-chat" class="tab-content">
        <div id="chatMenu">
            <h3>💬 選擇傾計對象：</h3>
            <div class="chat-list" id="chatContactList"></div>
        </div>
        
        <div id="chatRoom" class="chat-window">
            <button class="back-chat-btn" onclick="closeChat()">⬅ 返回聯絡人列表</button>
            <div class="chat-box" id="chatBox"></div>
            <div class="choices-container" id="chatChoices"></div>
        </div>
    </div>
</div>

<!-- 遊戲結束彈窗 -->
<div class="modal" id="gameOverModal">
    <div class="modal-content">
        <h2 id="modalTitle" style="color:var(--hk-red);">人生結算報告</h2>
        <p id="modalDesc">你嘅香港人生到此為止。</p>
        <button class="restart-btn" onclick="initNewGame()">重新投胎</button>
    </div>
</div>

        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        if (tabId === 'home') {
            document.querySelector('.nav-tab:nth-child(1)').classList.add('active');
            document.getElementById('tab-home').classList.add('active');
        } else if (tabId === 'relations') {
            document.querySelector('.nav-tab:nth-child(2)').classList.add('active');
            document.getElementById('tab-relations').classList.add('active');
            renderRelations();
        } else if (tabId === 'chat') {
            document.querySelector('.nav-tab:nth-child(3)').classList.add('active');
            document.getElementById('tab-chat').classList.add('active');
            renderChatContacts();
        }
    }

    function initNewGame() {
        let randomSurname = surnames[Math.floor(Math.random() * surnames.length)];
        let randomGiven = givenNames[Math.floor(Math.random() * givenNames.length)];
        let randomDistObj = districts[Math.floor(Math.random() * districts.length)];

        player = {
            name: randomSurname + randomGiven,
            district: randomDistObj.name,
            housing: randomDistObj.housing,
            age: 0,
            year: 2026,
            health: 100,
            happiness: 80,
            smart: 50,
            wealth: randomDistObj.wealthMod,
            status: "初生嬰兒",
            relations: [
                { name: "嚴厲阿媽", relation: "母親", affection: 70, desc: "成日提醒你要注意學業同健康。" },
                { name: "慈祥老豆", relation: "父親", affection: 75, desc: "對你好支持，得閒會帶你周圍去。" },
                { name: "老友明仔", relation: "朋友", affection: 60, desc: "同你好啱傾嘅中學好友。" }
            ]
        };

        document.getElementById('gameOverModal').style.display = 'none';
        document.getElementById('storyText').innerText = `你喺香港嘅【${player.district}】順利出世喇！屋企住喺【${player.housing}】，父母滿心歡喜咁迎接你嘅到來。`;
        document.getElementById('choicesContainer').innerHTML = '';
        document.getElementById('nextYearBtn').style.display = 'block';
        updateUI();
        switchTab('home');
    }

    function updateUI() {
        document.getElementById('statHealthNum').innerText = player.health + '%';
        document.getElementById('barHealth').style.width = player.health + '%';

        document.getElementById('statHappinessNum').innerText = player.happiness + '%';
        document.getElementById('barHappiness').style.width = player.happiness + '%';

        document.getElementById('statSmartNum').innerText = player.smart + '%';
        document.getElementById('barSmart').style.width = player.smart + '%';

        document.getElementById('statWealthNum').innerText = '$' + player.wealth.toLocaleString();
        let wealthPercent = Math.min(100, (player.wealth / 500000) * 100);
        document.getElementById('barWealth').style.width = Math.max(0, wealthPercent) + '%';

        document.getElementById('infoName').innerText = `姓名：${player.name}`;
        document.getElementById('infoDistrict').innerText = `地區：${player.district} (${player.housing})`;
        document.getElementById('infoAge').innerText = `年齡：${player.age} 歲 (${player.status})`;
        document.getElementById('storyYear').innerText = `年份：${player.year}年`;
    }

    function nextYear() {
        player.age++;
        player.year++;
        
        if (player.age < 3) player.status = "初生嬰兒";
        else if (player.age < 7) player.status = "幼稚園學童";
        else if (player.age < 12) player.status = "小學學生";
        else if (player.age < 18) player.status = "中學學生";
        else if (player.age < 25) player.status = "大專生 / 斜槓族";
        else if (player.age < 60) player.status = "香港打工仔";
        else player.status = "榮休長者";

        let naturalDecay = player.age > 60 ? Math.floor(Math.random() * 4) + 1 : Math.floor(Math.random() * 2);
        player.health = Math.max(0, Math.min(100, player.health - naturalDecay));
        player.happiness = Math.max(0, Math.min(100, player.happiness + (Math.floor(Math.random() * 5) - 2)));

        if (player.health <= 0 || player.happiness <= 0) {
            endGame("由於生活壓力超出負荷或健康惡化，你的人生在香港畫上句號……");
            return;
        }

        // 檢查該特定年齡有冇專屬事件
        let currentEvent = exactAgeEventMap[player.age];

        if (currentEvent) {
            document.getElementById('storyText').innerText = `【${player.age}歲這年】 ${currentEvent.text}`;
            
            let choicesHTML = '';
            currentEvent.choices.forEach(c => {
                choicesHTML += `<button class="choice-btn" onclick='makeChoice(${JSON.stringify(c.effect)})'>${c.text}</button>`;
            });
            document.getElementById('choicesContainer').innerHTML = choicesHTML;
            document.getElementById('nextYearBtn').style.display = 'none';
        } else {
            // 超過地圖歲數嘅成年/長者期動態生成專屬宏大事件
            const adultPool = [
                { text: `喺${player.district}返工期間，公司突然宣佈進行架構重組，你面臨轉組定係跳槽嘅交叉點。`, choices: [{ text: "接受內部調職挑戰新崗位", effect: { smart: 8, wealth: 2000, happiness: 2 } }, { text: "趁機出黎外面見工轉工搵高人工", effect: { wealth: 5000, smart: 5, happiness: 5 } }] },
                { text: "朋友邀請你夾份合夥搞一間屬於自己嘅樓上咖啡店兼手作坊。", choices: [{ text: "大膽投資落去，實踐夢想", effect: { wealth: -15000, happiness: 15, smart: 8 } }, { text: "保守起見拒絕，穩陣逗人工", effect: { wealth: 4000, happiness: 2 } }] },
                { text: "屋企老舊電器突然全部損壞，要洗一大筆錢更換。", choices: [{ text: "一次過買晒最高質嘅節能新家電", effect: { wealth: -6000, health: 5, happiness: 3 } }, { text: "買二手或平價代替品算數", effect: { wealth: -1500, happiness: -2 } }] }
            ];
            let randEv = adultPool[Math.floor(Math.random() * adultPool.length)];
            document.getElementById('storyText').innerText = `【${player.age}歲這年】 ${randEv.text}`;
            
            let choicesHTML = '';
            randEv.choices.forEach(c => {
                choicesHTML += `<button class="choice-btn" onclick='makeChoice(${JSON.stringify(c.effect)})'>${c.text}</button>`;
            });
            document.getElementById('choicesContainer').innerHTML = choicesHTML;
            document.getElementById('nextYearBtn').style.display = 'none';
        }

        updateUI();
    }

    function makeChoice(effect) {
        if (effect.health) player.health = Math.max(0, Math.min(100, player.health + effect.health));
        if (effect.happiness) player.happiness = Math.max(0, Math.min(100, player.happiness + effect.happiness));
        if (effect.smart) player.smart = Math.max(0, Math.min(100, player.smart + effect.smart));
        if (effect.wealth) player.wealth += effect.wealth;

        updateUI();
        document.getElementById('choicesContainer').innerHTML = '';
        document.getElementById('nextYearBtn').style.display = 'block';

        if (player.health <= 0 || player.happiness <= 0) {
            endGame("人生告一段落……");
        }
    }

    function renderRelations() {
        let html = '';
        player.relations.forEach(r => {
            html += `
                <div class="relation-card">
                    <div class="relation-name">${r.name} (${r.relation})</div>
                    <div class="relation-desc">${r.desc}</div>
                    <div style="font-size:12px; color:#e67e22; margin-top:5px;">❤️ 好感度：${r.affection}%</div>
                </div>
            `;
        });
        document.getElementById('relationsList').innerHTML = html;
    }

    function renderChatContacts() {
        let html = '';
        player.relations.forEach(r => {
            html += `<button class="chat-contact-btn" onclick="openChat('${r.name}')">💬 同 ${r.name} 傾計 (好感度: ${r.affection}%)</button>`;
        });
        document.getElementById('chatContactList').innerHTML = html;
        document.getElementById('chatMenu').style.display = 'block';
        document.getElementById('chatRoom').style.display = 'none';
    }

    function openChat(name) {
        currentChatContact = name;
        document.getElementById('chatMenu').style.display = 'none';
        document.getElementById('chatRoom').style.display = 'block';
        
        let chatBox = document.getElementById('chatBox');
        let introText = "";
        if (name === "嚴厲阿媽") {
            introText = `喂，你今年已經 ${player.age} 歲喇（${player.status}），喺 ${player.district} 住得好唔好？有無畀心機讀書/做嘢？`;
        } else if (name === "慈祥老豆") {
            introText = `乖仔/乖女，聽講你最近財務狀況度有 $${player.wealth.toLocaleString()}，老豆得閒車你出去兜個風放鬆下？`;
        } else {
            introText = `喂！聽講你最近好忙於自己嘅生活同興趣，幾時得閒得滯開返局打機？`;
        }

        chatBox.innerHTML = `<div class="chat-bubble other"><b>${name}：</b>${introText}</div>`;
        generateChatChoices(name);
    }

    function generateChatChoices(name) {
        let choicesHTML = '';
        let options = [];

        if (name === "嚴厲阿媽") {
            options = [
                { text: "「我有好好照顧自己同控制開支架，唔使擔心！」", reply: "「知道就好，身為屋企人最緊要你健康平安，記得飲湯！」", effect: { happiness: 5, health: 3 } },
                { text: "「最近生活同工作壓力有啲大……」", reply: "「壓力大都要頂住架啦，香港地個個都係咁，返嚟阿媽煮餐好嘅你食！」", effect: { happiness: -2, health: -2 } },
                { text: "「得閒嘅話一陣返嚟屋企食飯，我有嘢想同你分享。」", reply: "「好呀！返嚟啦，我陣間去街市買你最鍾意食嘅餸。」", effect: { happiness: 8, health: 5 } }
            ];
        } else if (name === "慈祥老豆") {
            options = [
                { text: "「老豆放心，我依家生活過得幾好！」", reply: "「後生仔最緊要係肯搏肯試，有老豆喺度撐你！」", effect: { happiness: 10, health: 2 } },
                { text: "「最近手頭有啲緊絀……」", reply: "「使費大就同老豆講聲，呢封利是仔你拎去傍身先！」", effect: { happiness: 8, wealth: 500 } },
                { text: "「好呀！今個星期一齊去飲茶！」", reply: "「得！咁約定星期六朝早老豆卜定位去酒樓！」", effect: { happiness: 12 } }
            ];
        } else {
            options = [
                { text: "「今晚得閒！上網開Discord打返鋪機！」", reply: "「正啊！陣間夜啲見，今晚一定要打返夠本！」", effect: { happiness: 12 } },
                { text: "「最近忙緊自己嘅興趣同手作，無乜時間。」", reply: "「嘩你又搞咁多創作？得啦咁你忙先，搞掂再約過！」", effect: { smart: 3, happiness: 5 } },
                { text: "「得閒出嚟灣仔/沙田行下街食個下午茶！」", reply: "「好呀，陣間收工過嚟搵你，請你飲凍檸茶！」", effect: { happiness: 10 } }
            ];
        }

        options.forEach(opt => {
            choicesHTML += `<button class="choice-btn" onclick="sendChat('${name}', '${opt.text}', '${opt.reply}', ${JSON.stringify(opt.effect)})">${opt.text}</button>`;
        });

        document.getElementById('chatChoices').innerHTML = choicesHTML;
    }

    function sendChat(name, myText, replyText, effect) {
        let chatBox = document.getElementById('chatBox');
        
        // 即時上屏
        chatBox.innerHTML += `<div class="chat-bubble me"><b>你：</b>${myText}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        // 清空選項並显示正在輸入
        document.getElementById('chatChoices').innerHTML = `<p style="color:#718093; font-style:italic; text-align:center; font-size:13px;">對方正在輸入中...</p>`;

        setTimeout(() => {
            chatBox.innerHTML += `<div class="chat-bubble other"><b>${name}：</b>${replyText}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            if (effect.happiness) player.happiness = Math.min(100, player.happiness + effect.happiness);
            if (effect.health) player.health = Math.min(100, player.health + effect.health);
            if (effect.smart) player.smart = Math.min(100, player.smart + effect.smart);
            if (effect.wealth) player.wealth += effect.wealth;
            
            let rel = player.relations.find(r => r.name === name);
            if (rel) rel.affection = Math.min(100, rel.affection + 5);

            updateUI();

            setTimeout(() => {
                if (currentChatContact === name) {
                    generateChatChoices(name);
                }
            }, 500);
        }, 600);
    }

    function closeChat() {
        currentChatContact = null;
        renderChatContacts();
    }

    function endGame(reason) {
        document.getElementById('modalTitle').innerText = "🇭🇰 香港人生結算報告";
        document.getElementById('modalDesc').innerHTML = `
            <b>${reason}</b><br><br>
            • <b>姓名：</b>${player.name}<br>
            • <b>居住地區：</b>${player.district} (${player.housing})<br>
            • <b>享年：</b>${player.age} 歲<br>
            • <b>最終財富：</b>$${player.wealth.toLocaleString()} 港幣<br>
            • <b>最終智慧：</b>${player.smart}%<br>
            • <b>最終快樂指數：</b>${player.happiness}%
        `;
        document.getElementById('gameOverModal').style.display = 'flex';
    }

    initNewGame();
</script>

</body>
</html>
