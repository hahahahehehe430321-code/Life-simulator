<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港人生模擬器 - 終極互動版</title>
    <style>
        :root {
            --primary-color: #1e3799;
            --hk-red: #de2910;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #1e3799, #0c2461);
            color: white;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
        }
        header p {
            margin: 0;
            opacity: 0.8;
            font-size: 13px;
        }
        /* 導航目錄 */
        .nav-tabs {
            display: flex;
            background: #dfe4ea;
            border-bottom: 1px solid #ced6e0;
        }
        .nav-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            color: #57606f;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 15px;
            transition: all 0.2s;
        }
        .nav-tab.active {
            background: white;
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
        }
        .tab-content {
            display: none;
            padding: 20px;
            min-height: 380px;
        }
        .tab-content.active {
            display: block;
        }

        /* 狀態欄 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        .stat-card {
            background: white;
            padding: 10px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 3px;
            display: flex;
            justify-content: space-between;
        }
        .progress-bar-container {
            width: 100%;
            background: #e9ecef;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            transition: width 0.4s ease;
        }
        .bar-health { background-color: #2ecc71; }
        .bar-happiness { background-color: #f1c40f; }
        .bar-smart { background-color: #3498db; }
        .bar-wealth { background-color: #e67e22; }

        .info-panel {
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-weight: bold;
            font-size: 14px;
            color: #2c3e50;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
        }

        /* 故事區 */
        .story-year {
            font-size: 13px;
            color: var(--hk-red);
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .story-text {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .choice-btn {
            background: #ffffff;
            border: 2px solid #3498db;
            color: #2980b9;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .choice-btn:hover {
            background: #3498db;
            color: white;
            transform: translateY(-2px);
        }
        .next-year-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
            transition: background 0.2s;
            margin-top: 15px;
        }
        .next-year-btn:hover { background: #219653; }

        /* 人際關係頁面 */
        .relation-card {
            background: #f8f9fa;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #3498db;
        }
        .relation-name { font-weight: bold; font-size: 15px; color: #2c3e50; }
        .relation-desc { font-size: 13px; color: #666; margin-top: 3px; }

        /* 聊天室頁面 */
        .chat-list { display: flex; flex-direction: column; gap: 10px; }
        .chat-contact-btn {
            background: #fff;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: #2c3e50;
            transition: background 0.2s;
        }
        .chat-contact-btn:hover { background: #f1f2f6; }
        
        .chat-window { display: none; }
        .chat-box {
            background: #f1f2f6;
            height: 220px;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }
        .chat-bubble {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.4;
        }
        .chat-bubble.me { background: #3498db; color: white; align-self: flex-end; }
        .chat-bubble.other { background: white; color: #333; align-self: flex-start; border: 1px solid #ddd; }
        .back-chat-btn {
            background: #7f8c8d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 13px;
        }

        /* 彈窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 420px;
            width: 90%;
        }
        .restart-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🇭🇰 香港人生模擬器</h1>
        <p>自由決定 • 隨機事件 • 百歲長壽人生</p>
    </header>

    <!-- 頂部目錄導航 -->
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('home')">🏠 主頁</button>
        <button class="nav-tab" onclick="switchTab('relations')">👥 人際關係</button>
        <button class="nav-tab" onclick="switchTab('chat')">💬 聊天室</button>
    </div>

    <!-- 狀態欄 (全域顯示) -->
    <div class="stats-panel">
        <div class="stat-card">
            <div class="stat-label"><span>❤️ 健康</span><span id="statHealthNum">100%</span></div>
            <div class="progress-bar-container"><div id="barHealth" class="progress-bar bar-health" style="width: 100%;"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><span>😊 快樂指數</span><span id="statHappinessNum">80%</span></div>
            <div class="progress-bar-container"><div id="barHappiness" class="progress-bar bar-happiness" style="width: 80%;"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><span>🧠 智慧 / 學業</span><span id="statSmartNum">50%</span></div>
            <div class="progress-bar-container"><div id="barSmart" class="progress-bar bar-smart" style="width: 50%;"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><span>💰 財富</span><span id="statWealthNum">$5,000</span></div>
            <div class="progress-bar-container"><div id="barWealth" class="progress-bar bar-wealth" style="width: 20%;"></div></div>
        </div>
    </div>

    <div class="info-panel">
        <div class="info-row">
            <span id="infoName">姓名：--</span>
            <span id="infoDistrict">地區：--</span>
        </div>
        <div class="info-row">
            <span id="infoAge">年齡：0 歲</span>
            <span id="infoHousing">住屋：--</span>
        </div>
    </div>

    <!-- 頁面 1：主頁 (人生模擬) -->
    <div id="tab-home" class="tab-content active">
        <div class="story-year" id="storyYear">年份：2026年</div>
        <div class="story-text" id="storyText">正在隨機投胎中……</div>
        <div class="choices-container" id="choicesContainer"></div>
        <button class="next-year-btn" id="nextYearBtn" onclick="nextYear()" style="display:none;">⏩ 進入下一年</button>
    </div>

    <!-- 頁面 2：人際關係 -->
    <div id="tab-relations" class="tab-content">
        <h3>👥 現實人際網絡</h3>
        <div id="relationsList"></div>
    </div>

    <!-- 頁面 3：聊天室 -->
    <div id="tab-chat" class="tab-content">
        <div id="chatMenu">
            <h3>💬 選擇傾計對象：</h3>
            <div class="chat-list" id="chatContactList"></div>
        </div>
        
        <div id="chatRoom" class="chat-window">
            <button class="back-chat-btn" onclick="closeChat()">⬅ 返回聯絡人列表</button>
            <div class="chat-box" id="chatBox"></div>
            <div class="choices-container" id="chatChoices"></div>
        </div>
    </div>
</div>

<!-- 遊戲結束/結算彈窗 -->
<div class="modal" id="gameOverModal">
    <div class="modal-content">
        <h2 id="modalTitle" style="color:var(--hk-red);">人生結算報告</h2>
        <p id="modalDesc">你嘅香港人生到此為止。</p>
        <button class="restart-btn" onclick="initNewGame()">重新投胎</button>
    </div>
</div>

<script>
    const surnames = ["陳", "張", "李", "劉", "黃", "周", "吳", "鄭", "何", "馬", "郭", "梁", "林", "曾", "羅", "潘", "謝", "唐", "許", "容"];
    const givenNames = ["家豪", "美儀", "俊傑", "芷晴", "頌恩", "梓軒", "凱婷", "樂賢", "詩雅", "朗晴", "浩然", "曉彤", "健宏", "思敏", "柏熹", "詠琪", "彥廷", "若希", "海澄", "悅彤"];
    
    const districts = [
        { name: "沙田", housing: "公屋", wealthMod: 4000 },
        { name: "元朗", housing: "村屋", wealthMod: 5000 },
        { name: "觀塘", housing: "舊樓", wealthMod: 3000 },
        { name: "灣仔", housing: "唐樓", wealthMod: 7000 },
        { name: "將軍澳", housing: "私樓", wealthMod: 10000 },
        { name: "屯門", housing: "公屋", wealthMod: 3500 }
    ];

    let player = {
        name: "",
        district: "",
        housing: "",
        age: 0,
        year: 2026,
        health: 100,
        happiness: 80,
        smart: 50,
        wealth: 5000,
        status: "初生嬰兒",
        relations: [
            { name: "嚴厲阿媽", relation: "母親", affection: 70, desc: "成日提醒你要注意學業同健康。" },
            { name: "慈祥老豆", relation: "父親", affection: 75, desc: "對你好支持，得閒會帶你周圍去。" },
            { name: "老友明仔", relation: "朋友", affection: 60, desc: "同你好啱傾嘅中學好友。" }
        ]
    };

    // 豐富的各年齡層事件庫（隨機發生，玩家必須作出選擇）
    const lifeEvents = [
        // 幼兒與小學期 (1-11歲)
        {
            minAge: 1, maxAge: 11,
            text: "今日放假，老豆阿媽帶你去屋邨樓下嘅公園玩。見到隔離的小朋友想爭你嘅玩具。",
            choices: [
                { text: "大方分享玩具，一齊開心玩", effect: { happiness: 5, health: 2 } },
                { text: "扭計喊出嚟，一定要搶返個主導權", effect: { happiness: -2, smart: 2 } }
            ]
        },
        {
            minAge: 6, maxAge: 11,
            text: "學校今日派默書簿，你竟然攞左個高分，隔離同學問你點溫書。",
            choices: [
                { text: "毫無保留咁教識對方，建立友誼", effect: { smart: 5, happiness: 5 } },
                { text: "神祕笑笑聲話自己冇溫過書", effect: { smart: 3, happiness: 2 } }
            ]
        },
        // 中學期 (12-17歲)
        {
            minAge: 12, maxAge: 17,
            text: "今日放學經過士多，見到有新款心儀嘅手作工具同盲盒，但係零用錢唔係好夠。",
            choices: [
                { text: "忍痛用晒呢個星期嘅飯錢去買", effect: { wealth: -100, happiness: 15 } },
                { text: "死慳死抵將錢儲起，返屋企自己用廢料DIY", effect: { wealth: 50, smart: 5, happiness: 5 } }
            ]
        },
        {
            minAge: 15, maxAge: 18,
            text: "面臨地獄級嘅 DSE 考試，溫書溫到個人好大壓力和疲倦。",
            choices: [
                { text: "通宵達旦狂溫，誓要考入三大", effect: { smart: 15, health: -10, happiness: -10 } },
                { text: "適可而止，得閒去彈下結他同聽歌放鬆", effect: { happiness: 15, smart: 3, health: 5 } }
            ]
        },
        // 大學與青年期 (18-29歲)
        {
            minAge: 18, maxAge: 29,
            text: "大學莊期或者兼職返工忙到天昏地暗，老細/組員突然要求你今個週末OT幫手趕死線。",
            choices: [
                { text: "頂硬上直踩OT，賺多啲外快同經驗", effect: { wealth: 2000, health: -8, happiness: -5 } },
                { text: "拒絕OT，放假去行山睇日落嘆Me Time", effect: { health: 10, happiness: 15, wealth: -100 } }
            ]
        },
        {
            minAge: 22, maxAge: 35,
            text: "同朋友夾份搞緊一場小型手作市集展覽，但人手同資金有啲緊絀。",
            choices: [
                { text: "落力宣傳同擺檔，務求做到最好", effect: { wealth: 1500, smart: 8, happiness: 12 } },
                { text: "順其自然，當作是一次普通經驗", effect: { happiness: 5 } }
            ]
        },
        // 成年打工與中年期 (30-55歲)
        {
            minAge: 30, maxAge: 55,
            text: "公司內部有得升職，但代價係要調去工作量極大嘅核心部門，經常要夜歸。",
            choices: [
                { text: "接受挑戰，為前途同高薪搏盡", effect: { wealth: 8000, smart: 10, health: -12, happiness: -8 } },
                { text: "拒絕升職，選擇穩定嘅工作享受生活", effect: { happiness: 10, health: 5 } }
            ]
        },
        {
            minAge: 35, maxAge: 60,
            text: "屋企層舊樓開始老化，水喉出現滲水問題，需要一大筆錢去維修。",
            choices: [
                { text: "拿出一大筆積蓄徹底大翻新", effect: { wealth: -15000, happiness: 5, health: 5 } },
                { text: "自己買材料簡單補救算數", effect: { wealth: -2000, smart: 5, happiness: -5 } }
            ]
        },
        // 老年期 (60-99歲)
        {
            minAge: 60, maxAge: 95,
            text: "已經到了退休年齡，今日落公園晨運，見到一班老友記喺度耍太極同傾古仔。",
            choices: [
                { text: "加入行列一齊耍太極，過寫意晚年", effect: { health: 10, happiness: 12 } },
                { text: "返屋企繼續研究自己喜愛嘅畫畫同手作", effect: { smart: 5, happiness: 15 } }
            ]
        }
    ];

    const chatData = {
        "嚴厲阿媽": {
            intro: "喂，你陣間得唔得閒呀？今日洗咗幾多錢？有無好好照顧自己？",
            options: [
                { text: "「知啦知啦，我有好好照顧自己同控制開支架！」", reply: "「知道就好，唔好成日令人擔心，記得飲多啲水！」", effect: { happiness: 5, health: 3 } },
                { text: "「得閒嘅話一陣返嚟食飯，我有嘢想同你分享。」", reply: "「好呀，返嚟啦，我陣間煲定個靚湯畀你。」", effect: { happiness: 8, health: 5 } }
            ]
        },
        "慈祥老豆": {
            intro: "仔/女，最近工作同生活成唔成? 記住Liza唱嗰首……抖下先最緊要。",
            options: [
                { text: "「老豆放心，我好識得平衡生活架！」", reply: "「後生仔最緊要係身體健康，有咩唔開心隨時同老豆講。」", effect: { happiness: 10, health: 2 } },
                { text: "「有啲攰呀，不過好快放假喇。」", reply: "「咁放假老豆車你去d靚地方行下，鬆一鬆先！」", effect: { happiness: 12 } }
            ]
        },
        "老友明仔": {
            intro: "喂！幾時得閒出黎敘舊，定係上Discord開局打返鋪機？",
            options: [
                { text: "「今晚得閒！上網開局見！」", reply: "「正！今晚一定要打返夠本！」", effect: { happiness: 12 } },
                `「最近忙緊自己嘅興趣同手作，下次先啦！」`,
                { reply: "「嘩你又搞咁多創作？得啦咁你忙先，下次再約！」", effect: { smart: 3, happiness: 5 } }
            ]
        }
    };

    function switchTab(tabId) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        if (tabId === 'home') {
            document.querySelector('.nav-tab:nth-child(1)').classList.add('active');
            document.getElementById('tab-home').classList.add('active');
        } else if (tabId === 'relations') {
            document.querySelector('.nav-tab:nth-child(2)').classList.add('active');
            document.getElementById('tab-relations').classList.add('active');
            renderRelations();
        } else if (tabId === 'chat') {
            document.querySelector('.nav-tab:nth-child(3)').classList.add('active');
            document.getElementById('tab-chat').classList.add('active');
            renderChatContacts();
        }
    }

    function initNewGame() {
        let randomSurname = surnames[Math.floor(Math.random() * surnames.length)];
        let randomGiven = givenNames[Math.floor(Math.random() * givenNames.length)];
        let randomDistObj = districts[Math.floor(Math.random() * districts.length)];

        player = {
            name: randomSurname + randomGiven,
            district: randomDistObj.name,
            housing: randomDistObj.housing,
            age: 0,
            year: 2026,
            health: 100,
            happiness: 80,
            smart: 50,
            wealth: randomDistObj.wealthMod,
            status: "初生嬰兒",
            relations: [
                { name: "嚴厲阿媽", relation: "母親", affection: 70, desc: "成日提醒你要注意學業同健康。" },
                { name: "慈祥老豆", relation: "父親", affection: 75, desc: "對你好支持，得閒會帶你周圍去。" },
                { name: "老友明仔", relation: "朋友", affection: 60, desc: "同你好啱傾嘅中學好友。" }
            ]
        };

        document.getElementById('gameOverModal').style.display = 'none';
        document.getElementById('storyText').innerText = `你喺香港嘅【${player.district}】順利出世喇！屋企住喺【${player.housing}】，父母滿心歡喜咁迎接你嘅到來。`;
        document.getElementById('choicesContainer').innerHTML = '';
        document.getElementById('nextYearBtn').style.display = 'block';
        updateUI();
        switchTab('home');
    }

    function updateUI() {
        document.getElementById('statHealthNum').innerText = player.health + '%';
        document.getElementById('barHealth').style.width = player.health + '%';

        document.getElementById('statHappinessNum').innerText = player.happiness + '%';
        document.getElementById('barHappiness').style.width = player.happiness + '%';

        document.getElementById('statSmartNum').innerText = player.smart + '%';
        document.getElementById('barSmart').style.width = player.smart + '%';

        document.getElementById('statWealthNum').innerText = '$' + player.wealth.toLocaleString();
        let wealthPercent = Math.min(100, (player.wealth / 500000) * 100);
        document.getElementById('barWealth').style.width = Math.max(0, wealthPercent) + '%';

        document.getElementById('infoName').innerText = `姓名：${player.name}`;
        document.getElementById('infoDistrict').innerText = `地區：${player.district} (${player.housing})`;
        document.getElementById('infoAge').innerText = `年齡：${player.age} 歲 (${player.status})`;
        document.getElementById('storyYear').innerText = `年份：${player.year}年`;
    }

    function nextYear() {
        player.age++;
        player.year++;
        
        // 更新年齡身分
        if (player.age < 3) player.status = "初生嬰兒";
        else if (player.age < 7) player.status = "幼稚園學童";
        else if (player.age < 12) player.status = "小學學生";
        else if (player.age < 18) player.status = "中學學生";
        else if (player.age < 25) player.status = "大專生 / 斜槓族";
        else if (player.age < 60) player.status = "香港打工仔";
        else player.status = "榮休長者";

        // 自然年老老化機制：隨年齡增長，身體健康自然會有輕微耗損，但只要好好抉擇就可以活到高齡
        let naturalDecay = player.age > 60 ? Math.floor(Math.random() * 4) + 1 : Math.floor(Math.random() * 2);
        player.health = Math.max(0, Math.min(100, player.health - naturalDecay));
        player.happiness = Math.max(0, Math.min(100, player.happiness + (Math.floor(Math.random() * 5) - 2)));

        // 檢查死亡條件（健康或快樂歸零，或者正常自然老死：年齡去到 80 - 100 歲隨機自然終結）
        if (player.health <= 0 || player.happiness <= 0) {
            endGame("由於生活壓力超出負荷或健康惡化，你的人生在香港畫上句號……");
            return;
        }
        if (player.age >= 85 && Math.random() < 0.25) {
            endGame(`你在香港安詳度過左漫長嘅一生，享年 ${player.age} 歲。這是一個正常而完滿嘅百年人生。`);
            return;
        }

        // 篩選符合現時年齡層嘅事件
        let availableEvents = lifeEvents.filter(e => player.age >= e.minAge && player.age <= e.maxAge);
        
        if (availableEvents.length > 0 && Math.random() < 0.85) {
            let ev = availableEvents[Math.floor(Math.random() * availableEvents.length)];
            document.getElementById('storyText').innerText = `【${player.age}歲這年】 ${ev.text}`;
            
            let choicesHTML = '';
            ev.choices.forEach(c => {
                choicesHTML += `<button class="choice-btn" onclick='makeChoice(${JSON.stringify(c.effect)})'>${c.text}</button>`;
            });
            document.getElementById('choicesContainer').innerHTML = choicesHTML;
            document.getElementById('nextYearBtn').style.display = 'none';
        } else {
            // 平淡日常句式
            const routineStories = [
                `今年喺${player.district}過得好平穩。朝早如常搭港鐵返工返學，晏晝喺附近茶餐廳食左個常餐，生活踏實。`,
                `今年天氣唔錯，你喺${player.district}屋企附近同朋友行左陣街，買左件心儀嘅小飾物，心情愉快。`,
                `今年工作同生活都好順利，放假時留喺屋企煲劇、聼歌同埋享受難得嘅Me Time。`,
                `今年喺${player.district}經歷左轉變，生活節奏雖然快，但你都慢慢適應並享受其中。`
            ];
            let randomRoutine = `【${player.age}歲這年】 ` + routineStories[Math.floor(Math.random() * routineStories.length)];
            
            document.getElementById('storyText').innerText = randomRoutine;
            document.getElementById('choicesContainer').innerHTML = '';
            document.getElementById('nextYearBtn').style.display = 'block';
        }

        updateUI();
    }

    function makeChoice(effect) {
        if (effect.health) player.health = Math.max(0, Math.min(100, player.health + effect.health));
        if (effect.happiness) player.happiness = Math.max(0, Math.min(100, player.happiness + effect.happiness));
        if (effect.smart) player.smart = Math.max(0, Math.min(100, player.smart + effect.smart));
        if (effect.wealth) player.wealth += effect.wealth;

        updateUI();
        document.getElementById('choicesContainer').innerHTML = '';
        document.getElementById('nextYearBtn').style.display = 'block';

        if (player.health <= 0 || player.happiness <= 0) {
            endGame("人生告一段落……");
        }
    }

    function renderRelations() {
        let html = '';
        player.relations.forEach(r => {
            html += `
                <div class="relation-card">
                    <div class="relation-name">${r.name} (${r.relation})</div>
                    <div class="relation-desc">${r.desc}</div>
                    <div style="font-size:12px; color:#e67e22; margin-top:5px;">❤️ 好感度：${r.affection}%</div>
                </div>
            `;
        });
        document.getElementById('relationsList').innerHTML = html;
    }

    function renderChatContacts() {
        let html = '';
        player.relations.forEach(r => {
            html += `<button class="chat-contact-btn" onclick="openChat('${r.name}')">💬 同 ${r.name} 傾計</button>`;
        });
        document.getElementById('chatContactList').innerHTML = html;
        document.getElementById('chatMenu').style.display = 'block';
        document.getElementById('chatRoom').style.display = 'none';
    }

    function openChat(name) {
        document.getElementById('chatMenu').style.display = 'none';
        document.getElementById('chatRoom').style.display = 'block';
        
        let chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = `<div class="chat-bubble other"><b>${name}：</b>${chatData[name].intro}</div>`;

        let choicesHTML = '';
        chatData[name].options.forEach(opt => {
            choicesHTML += `<button class="choice-btn" onclick="sendChat('${name}', '${opt.text}', '${opt.reply}', ${JSON.stringify(opt.effect)})">${opt.text}</button>`;
        });
        document.getElementById('chatChoices').innerHTML = choicesHTML;
    }

    function sendChat(name, myText, replyText, effect) {
        let chatBox = document.getElementById('chatBox');
        chatBox.innerHTML += `<div class="chat-bubble me"><b>你：</b>${myText}</div>`;
        
        setTimeout(() => {
            chatBox.innerHTML += `<div class="chat-bubble other"><b>${name}：</b>${replyText}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 400);

        if (effect.happiness) player.happiness = Math.min(100, player.happiness + effect.happiness);
        if (effect.health) player.health = Math.min(100, player.health + effect.health);
        
        let rel = player.relations.find(r => r.name === name);
        if (rel) rel.affection = Math.min(100, rel.affection + 5);

        updateUI();
        document.getElementById('chatChoices').innerHTML = `<p style="color:green; font-weight:bold; text-align:center;">✓ 對話完成，心情與關係有所提升！</p>`;
    }

    function closeChat() {
        renderChatContacts();
    }

    function endGame(reason) {
        document.getElementById('modalTitle').innerText = "🇭🇰 香港人生結算報告";
        document.getElementById('modalDesc').innerHTML = `
            <b>${reason}</b><br><br>
            • <b>姓名：</b>${player.name}<br>
            • <b>居住地區：</b>${player.district} (${player.housing})<br>
            • <b>享年：</b>${player.age} 歲<br>
            • <b>最終財富：</b>$${player.wealth.toLocaleString()} 港幣<br>
            • <b>最終智慧：</b>${player.smart}%<br>
            • <b>最終快樂指數：</b>${player.happiness}%
        `;
        document.getElementById('gameOverModal').style.display = 'flex';
    }

    initNewGame();
</script>

</body>
</html>
