<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港人生模擬器 - 完整互動版</title>
    <style>
        :root {
            --primary-color: #1e3799;
            --hk-red: #de2910;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #1e3799, #0c2461);
            color: white;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
        }
        header p {
            margin: 0;
            opacity: 0.8;
            font-size: 13px;
        }
        /* 導航目錄 */
        .nav-tabs {
            display: flex;
            background: #dfe4ea;
            border-bottom: 1px solid #ced6e0;
        }
        .nav-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            color: #57606f;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 15px;
            transition: all 0.2s;
        }
        .nav-tab.active {
            background: white;
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
        }
        .tab-content {
            display: none;
            padding: 20px;
            min-height: 350px;
        }
        .tab-content.active {
            display: block;
        }

        /* 狀態欄 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        .stat-card {
            background: white;
            padding: 10px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 3px;
            display: flex;
            justify-content: space-between;
        }
        .progress-bar-container {
            width: 100%;
            background: #e9ecef;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            transition: width 0.4s ease;
        }
        .bar-health { background-color: #2ecc71; }
        .bar-happiness { background-color: #f1c40f; }
        .bar-smart { background-color: #3498db; }
        .bar-wealth { background-color: #e67e22; }

        .info-panel {
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-weight: bold;
            font-size: 14px;
            color: #2c3e50;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
        }

        /* 故事區 */
        .story-year {
            font-size: 13px;
            color: var(--hk-red);
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .story-text {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .choice-btn {
            background: #ffffff;
            border: 2px solid #3498db;
            color: #2980b9;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .choice-btn:hover {
            background: #3498db;
            color: white;
            transform: translateY(-2px);
        }
        .next-year-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
            transition: background 0.2s;
            margin-top: 15px;
        }
        .next-year-btn:hover { background: #219653; }

        /* 人際關係頁面 */
        .relation-card {
            background: #f8f9fa;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #3498db;
        }
        .relation-name { font-weight: bold; font-size: 15px; color: #2c3e50; }
        .relation-desc { font-size: 13px; color: #666; margin-top: 3px; }

        /* 聊天室頁面 */
        .chat-list { display: flex; flex-direction: column; gap: 10px; }
        .chat-contact-btn {
            background: #fff;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: #2c3e50;
            transition: background 0.2s;
        }
        .chat-contact-btn:hover { background: #f1f2f6; }
        
        .chat-window { display: none; }
        .chat-box {
            background: #f1f2f6;
            height: 220px;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }
        .chat-bubble {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.4;
        }
        .chat-bubble.me { background: #3498db; color: white; align-self: flex-end; }
        .chat-bubble.other { background: white; color: #333; align-self: flex-start; border: 1px solid #ddd; }
        .back-chat-btn {
            background: #7f8c8d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 13px;
        }

        /* 彈窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .restart-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🇭🇰 香港人生模擬器</h1>
        <p>生活、人際、聊天互動版</p>
    </header>

    <!-- 頂部目錄導航 -->
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('home')">🏠 主頁</button>
        <button class="nav-tab" onclick="switchTab('relations')">👥 人際關係</button>
        <button class="nav-tab" onclick="switchTab('chat')">💬 聊天室</button>
    </div>

    <!-- 狀態欄 (全域顯示) -->
    <div class="stats-panel">
        <div class="stat-card">
            <div class="stat-label"><span>❤️ 健康</span><span id="statHealthNum">100%</span></div>
            <div class="progress-bar-container"><div id="barHealth" class="progress-bar bar-health" style="width: 100%;"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><span>😊 快樂指數</span><span id="statHappinessNum">80%</span></div>
            <div class="progress-bar-container"><div id="barHappiness" class="progress-bar bar-happiness" style="width: 80%;"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><span>🧠 智慧 / 學業</span><span id="statSmartNum">50%</span></div>
            <div class="progress-bar-container"><div id="barSmart" class="progress-bar bar-smart" style="width: 50%;"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><span>💰 財富</span><span id="statWealthNum">$5,000</span></div>
            <div class="progress-bar-container"><div id="barWealth" class="progress-bar bar-wealth" style="width: 20%;"></div></div>
        </div>
    </div>

    <div class="info-panel">
        <div class="info-row">
            <span id="infoName">姓名：--</span>
            <span id="infoDistrict">地區：--</span>
        </div>
        <div class="info-row">
            <span id="infoAge">年齡：0 歲</span>
            <span id="infoHousing">住屋：--</span>
        </div>
    </div>

    <!-- 頁面 1：主頁 (人生模擬) -->
    <div id="tab-home" class="tab-content active">
        <div class="story-year" id="storyYear">年份：2026年</div>
        <div class="story-text" id="storyText">正在隨機投胎中……</div>
        <div class="choices-container" id="choicesContainer"></div>
        <button class="next-year-btn" id="nextYearBtn" onclick="nextYear()">⏩ 大一歲 (進入下年)</button>
    </div>

    <!-- 頁面 2：人際關係 -->
    <div id="tab-relations" class="tab-content">
        <h3>👥 現實人際網絡</h3>
        <div id="relationsList">
            <!-- 動態生成 -->
        </div>
    </div>

    <!-- 頁面 3：聊天室 -->
    <div id="tab-chat" class="tab-content">
        <div id="chatMenu">
            <h3>💬 選擇傾計對象：</h3>
            <div class="chat-list" id="chatContactList">
                <!-- 動態生成聯絡人 -->
            </div>
        </div>
        
        <div id="chatRoom" class="chat-window">
            <button class="back-chat-btn" onclick="closeChat()">⬅ 返回聯絡人列表</button>
            <div class="chat-box" id="chatBox"></div>
            <div class="choices-container" id="chatChoices"></div>
        </div>
    </div>
</div>

<!-- 遊戲結束彈窗 -->
<div class="modal" id="gameOverModal">
    <div class="modal-content">
        <h2 id="modalTitle" style="color:var(--hk-red);">遊戲結束</h2>
        <p id="modalDesc">你嘅香港人生到此為止。</p>
        <button class="restart-btn" onclick="initNewGame()">重新投胎</button>
    </div>
</div>

<script>
    const surnames = ["陳", "張", "李", "劉", "黃", "周", "吳", "鄭", "何", "馬", "郭", "梁", "林", "曾", "羅", "潘", "謝", "唐", "許", "容"];
    const givenNames = ["家豪", "美儀", "俊傑", "芷晴", "頌恩", "梓軒", "凱婷", "樂賢", "詩雅", "朗晴", "浩然", "曉彤", "健宏", "思敏", "柏熹", "詠琪", "彥廷", "若希", "海澄", "悅彤"];
    
    const districts = [
        { name: "沙田", housing: "公屋", wealthMod: 4000 },
        { name: "元朗", housing: "村屋", wealthMod: 5000 },
        { name: "觀塘", housing: "舊樓", wealthMod: 3000 },
        { name: "灣仔", housing: "唐樓", wealthMod: 7000 },
        { name: "將軍澳", housing: "私樓", wealthMod: 10000 },
        { name: "屯門", housing: "公屋", wealthMod: 3500 }
    ];

    let player = {
        name: "",
        district: "",
        housing: "",
        age: 0,
        year: 2026,
        health: 100,
        happiness: 80,
        smart: 50,
        wealth: 5000,
        status: "初生嬰兒",
        relations: [
            { name: "嚴厲阿媽", relation: "母親", affection: 70, desc: "成日催你溫書同埋叫你飲涼茶。" },
            { name: "慈祥老豆", relation: "父親", affection: 75, desc: "得閒會買格仔餅或者麥當勞氹你開心。" },
            { name: "中學老友明仔", relation: "朋友", affection: 60, desc: "成日同你一齊打機同夾band嘅好兄弟。" }
        ]
    };

    // 聊天室劇情數據
    const chatData = {
        "嚴厲阿媽": {
            intro: "喂，你陣間得唔得閒呀？溫咗書未先？",
            options: [
                { text: "「啱啱溫完喇，一陣想去夾陣band放鬆。」", reply: "「又掛住玩！讀書緊要呀，陣間記得飲埋碗廿四味！」", effect: { happiness: 5, health: 5 } },
                { text: "「好攰呀，想抖陣先……」", reply: "「知你攰架啦，但係前途重要呀。拿，雪櫃有舊叉燒飯，叮嚟食啦。」", effect: { happiness: 2 } }
            ]
        },
        "慈祥老豆": {
            intro: "仔/女，聽日放假使唔使老豆車你去銅鑼灣呀？",
            options: [
                { text: "「好呀！順便想去買啲手作材料同畫具。」", reply: "「冇問題！後生女/仔有藝術天分係好事，老豆支持你！」", effect: { happiness: 10 } },
                { text: "「唔使喇，約左朋友去溜冰同踩板。」", reply: "「咁自己小心安全呀，陣間過馬路唔好睇手機。」", effect: { happiness: 8, health: 2 } }
            ]
        },
        "中學老友明仔": {
            intro: "喂！今晚得唔得閒開discord連線打返鋪機？",
            options: [
                { text: "「好呀！陣間夜晚九點見！」", reply: "「正！今晚一定要打爆機，場場都Carry你！」", effect: { happiness: 12 } },
                { text: "「唔得呀，我要執靚啲Concert應援手作，好忙。」", reply: "「嘩你又整手作？得啦咁你忙先，下次先打！」", effect: { smart: 2, happiness: 5 } }
            ]
        }
    };

    function switchTab(tabId) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        if (tabId === 'home') {
            document.querySelector('.nav-tab:nth-child(1)').classList.add('active');
            document.getElementById('tab-home').classList.add('active');
        } else if (tabId === 'relations') {
            document.querySelector('.nav-tab:nth-child(2)').classList.add('active');
            document.getElementById('tab-relations').classList.add('active');
            renderRelations();
        } else if (tabId === 'chat') {
            document.querySelector('.nav-tab:nth-child(3)').classList.add('active');
            document.getElementById('tab-chat').classList.add('active');
            renderChatContacts();
        }
    }

    function initNewGame() {
        let randomSurname = surnames[Math.floor(Math.random() * surnames.length)];
        let randomGiven = givenNames[Math.floor(Math.random() * givenNames.length)];
        let randomDistObj = districts[Math.floor(Math.random() * districts.length)];

        player = {
            name: randomSurname + randomGiven,
            district: randomDistObj.name,
            housing: randomDistObj.housing,
            age: 0,
            year: 2026,
            health: 100,
            happiness: 80,
            smart: 50,
            wealth: randomDistObj.wealthMod,
            status: "初生嬰兒",
            relations: [
                { name: "嚴厲阿媽", relation: "母親", affection: 70, desc: "成日提醒你要注意學業同健康。" },
                { name: "慈祥老豆", relation: "父親", affection: 75, desc: "對你好支持，得閒會帶你周圍去。" },
                { name: "老友明仔", relation: "朋友", affection: 60, desc: "同你好啱傾嘅中學好友。" }
            ]
        };

        document.getElementById('gameOverModal').style.display = 'none';
        document.getElementById('storyText').innerText = `你喺香港嘅【${player.district}】順利出世喇！屋企住喺【${player.housing}】，父母滿心歡喜咁迎接你嘅到來。`;
        document.getElementById('choicesContainer').innerHTML = '';
        document.getElementById('nextYearBtn').style.display = 'block';
        updateUI();
        switchTab('home');
    }

    function updateUI() {
        document.getElementById('statHealthNum').innerText = player.health + '%';
        document.getElementById('barHealth').style.width = player.health + '%';

        document.getElementById('statHappinessNum').innerText = player.happiness + '%';
        document.getElementById('barHappiness').style.width = player.happiness + '%';

        document.getElementById('statSmartNum').innerText = player.smart + '%';
        document.getElementById('barSmart').style.width = player.smart + '%';

        document.getElementById('statWealthNum').innerText = '$' + player.wealth.toLocaleString();
        let wealthPercent = Math.min(100, (player.wealth / 500000) * 100);
        document.getElementById('barWealth').style.width = Math.max(0, wealthPercent) + '%';

        document.getElementById('infoName').innerText = `姓名：${player.name}`;
        document.getElementById('infoDistrict').innerText = `地區：${player.district} (${player.housing})`;
        document.getElementById('infoAge').innerText = `年齡：${player.age} 歲 (${player.status})`;
        document.getElementById('storyYear').innerText = `年份：${player.year}年`;
    }

    function nextYear() {
        player.age++;
        player.year++;
        
        if (player.age < 3) player.status = "初生嬰兒";
        else if (player.age < 7) player.status = "幼稚園學童";
        else if (player.age < 12) player.status = "小學雞";
        else if (player.age < 18) player.status = "中學生";
        else if (player.age < 25) player.status = "斜槓族 / 大學生";
        else player.status = "香港打工仔";

        player.health = Math.max(0, Math.min(100, player.health - Math.floor(Math.random() * 2)));
        player.happiness = Math.max(0, Math.min(100, player.happiness + (Math.floor(Math.random() * 5) - 2)));

        if (player.health <= 0 || player.happiness <= 0) {
            endGame("由於生活壓力太大，身體與心靈超出負荷……");
            return;
        }

        const routineStories = [
            `今年喺${player.district}過得好充實。朝早趕住搭港鐵返工返學，晏晝喺茶餐廳食左個常餐，味道唔錯。`,
            `今年屋企附近開咗間新嘅文青咖啡室，你得閒去咗打卡，順便畫咗幾幅水彩畫。`,
            `今年天氣有啲反覆，你喺${player.district}同朋友行左陣街，買左件心儀嘅小飾物。`,
            `今年生活好平穩，放假留喺屋企煲劇、彈下結他同聽歌，享受Me Time。`
        ];
        let randomRoutine = routineStories[Math.floor(Math.random() * routineStories.length)];
        
        document.getElementById('storyText').innerText = randomRoutine;
        document.getElementById('choicesContainer').innerHTML = '';
        updateUI();
    }

    function renderRelations() {
        let html = '';
        player.relations.forEach(r => {
            html += `
                <div class="relation-card">
                    <div class="relation-name">${r.name} (${r.relation})</div>
                    <div class="relation-desc">${r.desc}</div>
                    <div style="font-size:12px; color:#e67e22; margin-top:5px;">❤️ 好感度：${r.affection}%</div>
                </div>
            `;
        });
        document.getElementById('relationsList').innerHTML = html;
    }

    function renderChatContacts() {
        let html = '';
        player.relations.forEach(r => {
            html += `<button class="chat-contact-btn" onclick="openChat('${r.name}')">💬 同 ${r.name} 傾計</button>`;
        });
        document.getElementById('chatContactList').innerHTML = html;
        document.getElementById('chatMenu').style.display = 'block';
        document.getElementById('chatRoom').style.display = 'none';
    }

    function openChat(name) {
        document.getElementById('chatMenu').style.display = 'none';
        document.getElementById('chatRoom').style.display = 'block';
        
        let chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = `<div class="chat-bubble other"><b>${name}：</b>${chatData[name].intro}</div>`;

        let choicesHTML = '';
        chatData[name].options.forEach(opt => {
            choicesHTML += `<button class="choice-btn" onclick="sendChat('${name}', '${opt.text}', '${opt.reply}', ${JSON.stringify(opt.effect)})">${opt.text}</button>`;
        });
        document.getElementById('chatChoices').innerHTML = choicesHTML;
    }

    function sendChat(name, myText, replyText, effect) {
        let chatBox = document.getElementById('chatBox');
        chatBox.innerHTML += `<div class="chat-bubble me"><b>你：</b>${myText}</div>`;
        
        setTimeout(() => {
            chatBox.innerHTML += `<div class="chat-bubble other"><b>${name}：</b>${replyText}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 400);

        // 套用效果
        if (effect.happiness) player.happiness = Math.min(100, player.happiness + effect.happiness);
        if (effect.health) player.health = Math.min(100, player.health + effect.health);
        
        // 增加好感度
        let rel = player.relations.find(r => r.name === name);
        if (rel) rel.affection = Math.min(100, rel.affection + 5);

        updateUI();
        document.getElementById('chatChoices').innerHTML = `<p style="color:green; font-weight:bold; text-align:center;">✓ 對話完成，心情有所提升！</p>`;
    }

    function closeChat() {
        renderChatContacts();
    }

    function endGame(reason) {
        document.getElementById('modalTitle').innerText = "Game Over - 人生重來";
        document.getElementById('modalDesc').innerText = `${reason}\n你在香港 (${player.district}) 生活左 ${player.age} 年，總共儲左 $${player.wealth.toLocaleString()}。`;
        document.getElementById('gameOverModal').style.display = 'flex';
    }

    initNewGame();
</script>

</body>
</html>
